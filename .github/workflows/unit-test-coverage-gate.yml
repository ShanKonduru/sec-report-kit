name: Unit Tests and Coverage Gate

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit tests must pass
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN || github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[mcp,dev]"

      - name: Run unit tests
        run: pytest -q

  coverage-gate:
    name: Coverage must be 100%
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN || github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[mcp,dev]" pytest-cov

      - name: Enforce 100% coverage
        run: |
          pytest --cov=sec_report_kit --cov-report=term-missing --cov-fail-under=100
